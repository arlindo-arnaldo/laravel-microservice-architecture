services:

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./auth-service:/var/www
    environment:
      DB_HOST: auth-db

  auth-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  product-service:
    build: ./product-service
    ports:
      - "8002:8000"
    volumes:
      - ./product-service:/var/www
    environment:
      DB_HOST: product-db
      AUTH_SERVICE_URL: http://auth-service:8000

  product-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"