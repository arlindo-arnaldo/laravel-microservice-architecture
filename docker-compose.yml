services:

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      auth-db:
        condition: service_healthy

  auth-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build: ./product-service
    ports:
      - "8002:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: product-db
      DB_PORT: 3306
      DB_DATABASE: product_db
      DB_USERNAME: root
      DB_PASSWORD: root
      AUTH_SERVICE_URL: http://auth-service:8000
    depends_on:
      product-db:
        condition: service_healthy

  product-db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10